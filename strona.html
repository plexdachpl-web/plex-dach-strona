<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Plex-Dach</title>
  <meta name="description" id="page-desc" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #14241D;
      --gold: #BE8A4B;
      --cream: #F5EDD8;
      --dark: #0e1a14;
    }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
    }
    .top-bar {
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid rgba(190,138,75,.2);
    }
    .top-bar a {
      color: var(--gold);
      text-decoration: none;
      font-size: .9rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .top-bar a:hover { color: var(--cream); }
    .brand {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--cream);
      text-decoration: none;
      margin-left: auto;
    }
    .brand span { color: var(--gold); }
    .page-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 2rem;
      color: var(--cream);
    }
    .content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--cream);
      margin: 2.5rem 0 1rem;
    }
    .content h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--gold);
      margin: 2rem 0 .8rem;
    }
    .content p {
      line-height: 1.8;
      color: rgba(245,237,216,.85);
      margin-bottom: 1.2rem;
    }
    .content ul, .content ol {
      padding-left: 1.5rem;
      margin-bottom: 1.2rem;
    }
    .content li {
      line-height: 1.8;
      color: rgba(245,237,216,.85);
      margin-bottom: .4rem;
    }
    .content a { color: var(--gold); }
    .content strong { color: var(--cream); }
    .content em { font-style: italic; color: var(--gold); }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      color: rgba(245,237,216,.4);
    }
    .not-found {
      text-align: center;
      padding: 6rem 2rem;
      color: rgba(245,237,216,.4);
    }
    .not-found a { color: var(--gold); }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="/">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Wróć na stronę główną
    </a>
    <a class="brand" href="/">PLEX<span>·</span>DACH</a>
  </div>

  <div class="page-wrap">
    <div id="loading" class="loading">Ładowanie...</div>
    <div id="not-found" class="not-found" style="display:none">
      <p>Nie znaleziono strony.</p>
      <a href="/">Wróć na stronę główną</a>
    </div>
    <div id="page-content" style="display:none">
      <h1 id="content-title"></h1>
      <div class="content" id="content-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const slug = params.get('s');

      if (!slug) {
        showNotFound();
        return;
      }

      try {
        const res = await fetch('/content/pages/' + slug + '.json');
        if (!res.ok) { showNotFound(); return; }
        const page = await res.json();

        document.getElementById('page-title').textContent = page.title + ' — Plex-Dach';
        if (page.description) {
          document.getElementById('page-desc').setAttribute('content', page.description);
        }
        document.getElementById('content-title').textContent = page.title;
        document.getElementById('content-body').innerHTML = marked.parse(page.body || '');

        document.getElementById('loading').style.display = 'none';
        document.getElementById('page-content').style.display = 'block';
      } catch (e) {
        showNotFound();
      }

      function showNotFound() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('not-found').style.display = 'block';
      }
    })();
  </script>
<script src="/js/cookie-consent.js" defer></script>
</body>
</html>
